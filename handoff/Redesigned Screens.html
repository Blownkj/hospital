<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Hospital — Redesigned Screens v1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
:root{
  --font-sans: "Inter Tight", -apple-system, "Segoe UI", sans-serif;
  --font-serif: "Instrument Serif", Georgia, serif;
  --font-mono: "JetBrains Mono", ui-monospace, monospace;
  --ink-900:#0E1116; --ink-700:#2B313A; --ink-500:#5A6472;
  --ink-400:#8A93A0; --ink-300:#B6BCC5;
  --ink-200:#E4E7EC; --ink-100:#EFF1F4; --ink-050:#F7F8FA; --paper:#FFFFFF;
  --ok-600:#2F7D5A; --ok-050:#EBF4EE;
  --warn-600:#B5751B; --warn-050:#FAF1E2;
  --err-600:#B33A3A; --err-050:#F8EAEA;
  --info-600:#2B5BB5; --info-050:#E8EEF8;
  --line:1px solid var(--ink-200);
  --r-xs:4px; --r-sm:6px; --r-md:8px; --r-lg:12px; --r-pill:999px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);font-size:15px;line-height:1.5;color:var(--ink-900);background:#fff;-webkit-font-smoothing:antialiased}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
a{color:inherit;text-decoration:none}
img,svg{display:block;max-width:100%}
input,textarea,select{font:inherit;color:inherit}
ul,ol{list-style:none}
h1,h2,h3,h4,h5,h6{font-weight:inherit;line-height:1.2;color:inherit}

/* ============ Shared component classes (scoped per artboard) ============ */
.scr{
  width:100%; height:100%;
  background: var(--ink-050);
  font-family: var(--font-sans);
  color: var(--ink-900);
  overflow: hidden;
  display: flex; flex-direction: column;
}

/* Top app bar (in-product) */
.appbar{
  display:flex; align-items:center; gap:24px;
  height:56px; padding:0 24px;
  background: var(--paper);
  border-bottom: var(--line);
}
.appbar__brand{ display:flex; align-items:center; gap:8px; font-weight:600; font-size:15px; letter-spacing:-.005em;}
.appbar__brand-mark{ width:24px; height:24px; border-radius:4px; background: var(--ink-900); color:#fff; display:grid; place-items:center; font-family: var(--font-serif); font-size:14px; line-height:1;}
.appbar__nav{ display:flex; gap:2px; margin-left:8px;}
.appbar__nav a{ padding:6px 10px; border-radius:6px; font-size:13px; color: var(--ink-500); font-weight:500;}
.appbar__nav a.is-active{ color: var(--ink-900); background: var(--ink-100);}
.appbar__nav a:hover{ color: var(--ink-900);}
.appbar__spacer{ flex:1;}
.appbar__search{
  display:flex; align-items:center; gap:8px;
  height:32px; padding:0 10px;
  background: var(--ink-100); border:1px solid transparent;
  border-radius:6px; font-size:13px; color: var(--ink-500);
  width: 240px;
}
.appbar__search svg{ flex-shrink:0;}
.appbar__icon{ width:32px; height:32px; display:grid; place-items:center; border-radius:6px; color: var(--ink-500);}
.appbar__icon:hover{ background: var(--ink-100); color: var(--ink-900);}
.appbar__avatar{
  display:flex; align-items:center; gap:8px;
  padding:4px 10px 4px 4px; border-radius: var(--r-pill); border: var(--line);
  font-size:13px; font-weight:500;
}
.appbar__avatar-circ{ width:24px; height:24px; border-radius:50%; background: var(--ink-900); color:#fff; display:grid; place-items:center; font-size:11px; font-weight:600;}

/* Public top bar (marketing) */
.tophead{
  display:flex; align-items:center; gap:32px;
  height:64px; padding:0 32px;
  background: var(--paper);
  border-bottom: var(--line);
}
.tophead__brand{ display:flex; align-items:center; gap:10px; font-family: var(--font-serif); font-size:22px; line-height:1;}
.tophead__brand-mark{ width:28px; height:28px; border-radius:4px; background: var(--ink-900); color:#fff; display:grid; place-items:center; font-family: var(--font-serif); font-size:16px; line-height:1;}
.tophead__nav{ display:flex; gap:4px; }
.tophead__nav a{ padding:8px 14px; font-size:14px; color: var(--ink-500); font-weight:500; border-radius:6px;}
.tophead__nav a.is-active{ color: var(--ink-900);}
.tophead__nav a:hover{ color: var(--ink-900);}
.tophead__spacer{ flex:1;}

/* Buttons */
.btn{ display:inline-flex; align-items:center; gap:8px; height:36px; padding:0 14px; border-radius:6px; font-size:14px; font-weight:500; border:1px solid transparent; transition: background .12s ease, border-color .12s ease; white-space:nowrap;}
.btn--primary{ background: var(--ink-900); color:#fff; border-color: var(--ink-900);}
.btn--primary:hover{ background: var(--ink-700); border-color: var(--ink-700);}
.btn--secondary{ background: var(--paper); color: var(--ink-900); border-color: var(--ink-200);}
.btn--secondary:hover{ background: var(--ink-100);}
.btn--ghost{ background: transparent; color: var(--ink-700);}
.btn--ghost:hover{ background: var(--ink-100); color: var(--ink-900);}
.btn--sm{ height: 28px; padding: 0 10px; font-size: 13px;}
.btn--lg{ height: 44px; padding: 0 18px; font-size: 15px;}
.btn--block{ width:100%; justify-content:center;}

/* Badges */
.badge{ display:inline-flex; align-items:center; gap:6px; height:22px; padding:0 8px; border-radius:6px; font-size:12px; font-weight:500; border:1px solid; background: var(--paper); white-space:nowrap;}
.badge .d{ width:6px; height:6px; border-radius:50%;}
.badge--ok{ color: var(--ok-600); border-color:#cfe1d6; background: var(--ok-050);} .badge--ok .d{background:var(--ok-600);}
.badge--warn{ color: var(--warn-600); border-color:#ecd9b8; background: var(--warn-050);} .badge--warn .d{background:var(--warn-600);}
.badge--err{ color: var(--err-600); border-color:#e4c4c4; background: var(--err-050);} .badge--err .d{background:var(--err-600);}
.badge--info{ color: var(--info-600); border-color:#cdd9ee; background: var(--info-050);} .badge--info .d{background:var(--info-600);}
.badge--neutral{ color: var(--ink-700); border-color: var(--ink-200); background: var(--ink-100);} .badge--neutral .d{background:var(--ink-500);}

/* Page containers */
.page-pad{ padding: 28px 32px; flex:1; overflow: auto;}
.page-head{ display:flex; align-items:end; justify-content: space-between; gap:16px; padding-bottom: 20px; border-bottom: var(--line); margin-bottom: 24px;}
.page-head__eyebrow{ font-family: var(--font-mono); font-size:11px; letter-spacing:.06em; text-transform: uppercase; color: var(--ink-500); margin-bottom:6px; display:flex; align-items:center; gap:8px;}
.page-head__eyebrow .dot{ width:5px; height:5px; border-radius:50%; background: var(--ok-600);}
.page-head__title{ font-family: var(--font-serif); font-size: 40px; line-height:1.05; letter-spacing:-.02em; font-weight:400;}
.page-head__title em{ font-style: italic; color: var(--ink-500);}
.page-head__sub{ font-size:14px; color: var(--ink-500); margin-top:6px; max-width: 60ch;}
.page-head__actions{ display:flex; gap:8px; flex-shrink: 0;}

/* KPI row */
.kpi-row{ display:grid; grid-template-columns: repeat(4,1fr); border: var(--line); border-radius: 8px; overflow:hidden; background: var(--paper); margin-bottom: 24px;}
.kpi{ padding: 18px 20px; border-right: var(--line); display:flex; flex-direction:column; gap:8px;}
.kpi:last-child{ border-right:none;}
.kpi__label{ font-family: var(--font-mono); font-size:11px; color: var(--ink-500); text-transform: uppercase; letter-spacing:.04em;}
.kpi__value{ font-family: var(--font-serif); font-size: 40px; font-weight:400; line-height:1; letter-spacing:-.02em; display:flex; align-items: baseline; gap: 8px;}
.kpi__delta{ font-family: var(--font-mono); font-size:12px; color: var(--ok-600);}
.kpi__delta--down{ color: var(--err-600);}
.kpi__sub{ font-size:12px; color: var(--ink-500);}
.kpi__spark{ height: 28px; margin-top: 2px;}

/* Card */
.card{ background: var(--paper); border: var(--line); border-radius: 8px; overflow: hidden;}
.card__head{ padding: 14px 18px; border-bottom: var(--line); display:flex; align-items:center; justify-content: space-between; gap: 12px;}
.card__head h3{ font-size: 14px; font-weight: 600; letter-spacing: -.005em;}
.card__head .meta{ font-family: var(--font-mono); font-size: 12px; color: var(--ink-500);}
.card__body{ padding: 18px;}
.card__foot{ padding: 12px 18px; border-top: var(--line); display:flex; align-items: center; justify-content: space-between; font-size: 12px; color: var(--ink-500);}

/* Table */
.tbl{ width: 100%; border-collapse: collapse; font-size: 13px;}
.tbl th{ text-align: left; padding: 10px 18px; font-family: var(--font-mono); font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .04em; color: var(--ink-500); background: var(--ink-050); border-bottom: var(--line); white-space: nowrap;}
.tbl td{ padding: 14px 18px; border-bottom: var(--line); vertical-align: middle;}
.tbl tr:last-child td{ border-bottom: none;}
.tbl tr:hover td{ background: var(--ink-050);}
.tbl .name{ font-weight: 500;}
.tbl .muted{ color: var(--ink-500);}
.tbl .mono{ font-family: var(--font-mono); font-size: 12px; color: var(--ink-700);}

/* Avatar */
.avatar{ width:32px; height:32px; border-radius:50%; background: var(--ink-100); color: var(--ink-700); display:grid; place-items:center; font-size:12px; font-weight:600; flex-shrink:0;}
.avatar--lg{ width:48px; height:48px; font-size:14px;}
.avatar--xl{ width:64px; height:64px; font-size:18px;}

/* Form field */
.field{ display:flex; flex-direction:column; gap:6px;}
.field__label{ font-size:13px; font-weight:500; color: var(--ink-700);}
.input{ height: 36px; padding: 0 12px; border-radius: 6px; border: 1px solid var(--ink-200); background: var(--paper); font-size: 14px;}
.input::placeholder{ color: var(--ink-400);}
.input:focus{ outline:none; border-color: var(--ink-900); box-shadow: 0 0 0 3px rgba(14,17,22,.08);}
.field__hint{ font-size:12px; color: var(--ink-500);}

/* Eyebrow utility */
.eyebrow{ font-family: var(--font-mono); font-size:11px; letter-spacing:.06em; text-transform: uppercase; color: var(--ink-500);}

/* === Login screen === */
.login-stage{
  flex:1; display:grid; grid-template-columns: 1.1fr 1fr; background: var(--paper);
}
.login-stage__art{
  background: var(--ink-900); color: #fff;
  padding: 40px;
  display:flex; flex-direction:column; justify-content:space-between;
  position: relative; overflow: hidden;
}
.login-stage__art::after{
  content:""; position: absolute; inset: 0;
  background-image:
    radial-gradient(circle at 1px 1px, rgba(255,255,255,.06) 1px, transparent 0);
  background-size: 24px 24px;
  pointer-events: none;
}
.login-stage__art-top{ display:flex; align-items:center; gap:10px; font-family: var(--font-serif); font-size:24px; position: relative; z-index:1;}
.login-stage__art-top-mark{ width:28px; height:28px; border-radius:4px; background:#fff; color: var(--ink-900); display:grid; place-items:center; font-family: var(--font-serif); font-size:16px; line-height:1;}
.login-stage__art-quote{ font-family: var(--font-serif); font-size: 36px; line-height: 1.15; letter-spacing:-.015em; max-width: 420px; position:relative; z-index:1;}
.login-stage__art-quote em{ font-style: italic; color: rgba(255,255,255,.7);}
.login-stage__art-meta{ font-family: var(--font-mono); font-size: 11px; color: rgba(255,255,255,.5); display:flex; gap: 16px; position:relative; z-index:1;}
.login-stage__art-meta b{ color: #fff; font-weight: 500;}

.login-form{ display:flex; flex-direction:column; justify-content:center; padding: 40px 56px; gap:8px;}
.login-form__eyebrow{ font-family: var(--font-mono); font-size: 11px; letter-spacing:.06em; text-transform: uppercase; color: var(--ink-500); margin-bottom: 4px;}
.login-form__title{ font-family: var(--font-serif); font-size: 36px; line-height: 1.1; letter-spacing:-.015em; font-weight: 400; margin-bottom: 4px;}
.login-form__sub{ font-size: 14px; color: var(--ink-500); margin-bottom: 20px;}
.login-form .field{ margin-bottom: 14px;}
.login-form__row{ display:flex; align-items:center; justify-content: space-between; margin: 4px 0 16px; font-size: 13px;}
.login-form__row label{ display:flex; align-items:center; gap:6px; color: var(--ink-700);}
.login-form__row a{ color: var(--ink-900); text-decoration: underline; text-underline-offset: 2px;}
.login-form .btn{ height: 40px;}
.login-form__divider{ display:flex; align-items:center; gap:12px; margin: 20px 0; color: var(--ink-400); font-family: var(--font-mono); font-size: 11px;}
.login-form__divider::before, .login-form__divider::after{ content:""; flex:1; height: 1px; background: var(--ink-200);}
.login-form__sso{ display:flex; gap: 8px;}
.login-form__sso .btn--secondary{ flex: 1; justify-content: center;}
.login-form__foot{ margin-top: 28px; font-size: 12px; color: var(--ink-500);}
.login-form__foot a{ color: var(--ink-900); text-decoration: underline; text-underline-offset: 2px;}

/* === Dashboard === */
.dash-grid{ display:grid; grid-template-columns: 2fr 1fr; gap: 16px;}
.appt-row{ display:grid; grid-template-columns: 64px 1fr auto auto; gap:14px; padding: 14px 18px; border-bottom: var(--line); align-items: center;}
.appt-row:last-child{ border-bottom: none;}
.appt-time{ font-family: var(--font-mono); font-size: 13px;}
.appt-time small{ display:block; color: var(--ink-500); font-size: 11px; margin-top: 2px;}
.appt-info__name{ font-weight: 500; font-size: 14px; margin-bottom: 2px;}
.appt-info__meta{ font-size: 12px; color: var(--ink-500);}

.list-empty{ padding: 36px 18px; text-align: center; color: var(--ink-500); font-size: 13px;}

.activity{ padding: 0;}
.activity__item{ display:grid; grid-template-columns: 12px 1fr auto; gap: 12px; padding: 14px 18px; border-bottom: var(--line); align-items: start;}
.activity__item:last-child{ border-bottom: none;}
.activity__dot{ width:8px; height:8px; border-radius:50%; margin-top: 6px; background: var(--ink-300);}
.activity__dot--ok{ background: var(--ok-600);}
.activity__dot--warn{ background: var(--warn-600);}
.activity__dot--info{ background: var(--info-600);}
.activity__title{ font-size: 13px; line-height: 1.45;}
.activity__title b{ font-weight: 500;}
.activity__time{ font-family: var(--font-mono); font-size: 11px; color: var(--ink-500); white-space: nowrap;}

/* === Doctors list === */
.filters{ display:flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;}
.chip{ display:inline-flex; align-items:center; gap:6px; padding: 6px 12px; border-radius: var(--r-pill); border: var(--line); font-size: 13px; color: var(--ink-700); background: var(--paper);}
.chip.is-active{ background: var(--ink-900); color: #fff; border-color: var(--ink-900);}
.chip .count{ color: var(--ink-400); font-family: var(--font-mono); font-size: 11px;}
.chip.is-active .count{ color: rgba(255,255,255,.6);}

.doc-list{ background: var(--paper); border: var(--line); border-radius: 8px; overflow: hidden;}
.doc-row{
  display:grid; grid-template-columns: 56px 2fr 1.4fr 1fr 1fr auto; gap: 18px;
  padding: 18px 20px; border-bottom: var(--line); align-items: center;
}
.doc-row:last-child{ border-bottom: none;}
.doc-row:hover{ background: var(--ink-050);}
.doc-row__avatar{ width: 48px; height: 48px; border-radius: 6px; background: var(--ink-100); color: var(--ink-700); display:grid; place-items: center; font-family: var(--font-serif); font-size: 22px;}
.doc-row__name{ font-weight: 500; font-size: 14px;}
.doc-row__spec{ font-size: 12px; color: var(--ink-500); margin-top: 2px;}
.doc-row__rating{ display:flex; align-items: center; gap: 6px; font-size: 13px;}
.doc-row__rating-star{ color: #B5751B;}
.doc-row__rating .count{ color: var(--ink-500); font-family: var(--font-mono); font-size: 11px;}
.doc-row__cell-label{ font-family: var(--font-mono); font-size: 10px; color: var(--ink-400); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px;}
.doc-row__cell-val{ font-size: 13px;}

/* === Doctor detail === */
.det-head{ display:grid; grid-template-columns: 96px 1fr auto; gap: 24px; align-items: start; padding: 28px; background: var(--paper); border: var(--line); border-radius: 8px; margin-bottom: 16px;}
.det-head__avatar{ width: 96px; height: 96px; border-radius: 8px; background: var(--ink-100); display:grid; place-items: center; font-family: var(--font-serif); font-size: 40px; color: var(--ink-700);}
.det-head__name{ font-family: var(--font-serif); font-size: 32px; line-height: 1.1; letter-spacing: -.015em; font-weight: 400; margin-bottom: 4px;}
.det-head__spec{ font-size: 14px; color: var(--ink-500); margin-bottom: 12px;}
.det-head__meta{ display:flex; gap: 24px; font-size: 13px; color: var(--ink-700);}
.det-head__meta div b{ font-weight: 500;}
.det-head__meta div span{ display:block; font-family: var(--font-mono); font-size: 11px; color: var(--ink-500); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 2px;}

.det-body{ display:grid; grid-template-columns: 2fr 1fr; gap: 16px;}
.tabs{ display:flex; gap: 0; border-bottom: var(--line); margin-bottom: 0;}
.tabs button{ padding: 10px 16px; font-size: 13px; font-weight: 500; color: var(--ink-500); border-bottom: 2px solid transparent; margin-bottom: -1px;}
.tabs button.is-active{ color: var(--ink-900); border-bottom-color: var(--ink-900);}

.schedule{ display:grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--ink-200); border: var(--line); border-radius: 6px; overflow: hidden;}
.schedule__day{ background: var(--paper); padding: 10px 8px; text-align: center; font-size: 12px;}
.schedule__day.off{ background: var(--ink-050); color: var(--ink-400);}
.schedule__day-name{ font-weight: 600; margin-bottom: 4px;}
.schedule__day-time{ font-family: var(--font-mono); font-size: 11px; color: var(--ink-500);}

.review{ padding: 16px 18px; border-bottom: var(--line);}
.review:last-child{ border-bottom: none;}
.review__head{ display:flex; align-items:center; gap: 10px; margin-bottom: 8px;}
.review__author{ font-size: 13px; font-weight: 500;}
.review__date{ font-family: var(--font-mono); font-size: 11px; color: var(--ink-500); margin-left: auto;}
.review__text{ font-size: 13px; color: var(--ink-700); line-height: 1.55;}
.stars{ display:flex; gap: 1px; color: #B5751B; font-size: 12px;}

/* === Public homepage === */
.public-hero{
  background: var(--paper);
  padding: 64px 48px 56px;
  border-bottom: var(--line);
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 48px;
  align-items: end;
}
.public-hero__title{ font-family: var(--font-serif); font-size: 64px; line-height: 1.02; letter-spacing: -.025em; font-weight: 400;}
.public-hero__title em{ font-style: italic; color: var(--ink-500);}
.public-hero__lead{ font-size: 16px; color: var(--ink-500); margin-top: 16px; max-width: 56ch;}
.public-hero__cta{ display:flex; gap: 8px; margin-top: 24px;}
.public-hero__panel{ background: var(--ink-050); border: var(--line); border-radius: 8px; padding: 20px;}
.public-hero__panel h4{ font-size: 12px; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: .04em; color: var(--ink-500); margin-bottom: 14px;}
.public-hero__quick{ display:flex; flex-direction: column; gap: 10px;}
.public-hero__quick label{ font-size: 12px; font-weight: 500; color: var(--ink-700); text-transform: none; letter-spacing: 0; font-family: var(--font-sans);}
.public-hero__quick select, .public-hero__quick input{ height: 36px; border-radius: 6px; border: 1px solid var(--ink-200); padding: 0 10px; font-size: 13px; background: var(--paper);}
.public-meta-row{
  display: grid; grid-template-columns: repeat(4, 1fr);
  background: var(--paper); border-bottom: var(--line);
}
.public-meta{ padding: 20px 32px; border-right: var(--line);}
.public-meta:last-child{ border-right: none;}
.public-meta__label{ font-family: var(--font-mono); font-size: 11px; color: var(--ink-500); text-transform: uppercase; letter-spacing: .04em;}
.public-meta__value{ font-family: var(--font-serif); font-size: 32px; line-height: 1.1; letter-spacing: -.02em; margin-top: 4px;}

.public-section{ padding: 48px 48px 16px;}
.public-section__head{ display:flex; align-items: end; justify-content: space-between; margin-bottom: 24px; padding-bottom: 12px; border-bottom: var(--line);}
.public-section__title{ font-family: var(--font-serif); font-size: 32px; line-height: 1.1; letter-spacing: -.015em;}
.public-section__title em{ font-style: italic; color: var(--ink-500);}
.public-section__more{ font-size: 13px; font-weight: 500; text-decoration: underline; text-underline-offset: 3px;}

.spec-list{ display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; border: var(--line); border-radius: 8px; overflow: hidden; background: var(--paper);}
.spec-item{ padding: 18px 20px; border-right: var(--line); border-bottom: var(--line);}
.spec-item:nth-child(4n){ border-right: none;}
.spec-item:nth-last-child(-n+4){ border-bottom: none;}
.spec-item__num{ font-family: var(--font-mono); font-size: 11px; color: var(--ink-400); margin-bottom: 6px;}
.spec-item__name{ font-size: 15px; font-weight: 500; margin-bottom: 4px;}
.spec-item__doctors{ font-family: var(--font-mono); font-size: 11px; color: var(--ink-500); text-transform: uppercase; letter-spacing: .04em;}

/* === Articles list === */
.art-grid{ display:grid; grid-template-columns: repeat(3, 1fr); gap: 16px;}
.art{ background: var(--paper); border: var(--line); border-radius: 8px; padding: 22px; display:flex; flex-direction: column;}
.art__cat{ font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--ink-500); margin-bottom: 16px; display: flex; justify-content: space-between;}
.art__cat .read{ color: var(--ink-400);}
.art__title{ font-family: var(--font-serif); font-size: 22px; line-height: 1.2; letter-spacing: -.01em; margin-bottom: 10px;}
.art__excerpt{ font-size: 13px; color: var(--ink-500); line-height: 1.55; flex: 1; margin-bottom: 16px;}
.art__foot{ display:flex; align-items: center; justify-content: space-between; padding-top: 14px; border-top: var(--line); font-size: 12px; color: var(--ink-500);}
.art__foot a{ color: var(--ink-900); font-weight: 500; text-decoration: underline; text-underline-offset: 2px;}

/* Misc */
.row-divider{ height: 1px; background: var(--ink-200); margin: 0;}
.toolbar{ display:flex; gap: 8px; align-items: center;}
.search-input{ display:flex; align-items: center; gap: 8px; height: 36px; padding: 0 12px; border-radius: 6px; background: var(--paper); border: var(--line); font-size: 13px; color: var(--ink-500); width: 280px;}
